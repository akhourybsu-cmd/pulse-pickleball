project_id = "ryxklkayezjnwwunuphn"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[auth]
enabled = true

[functions.notify-contested-match]
verify_jwt = false

[functions.delete-old-posts]
verify_jwt = true

[functions.calculate-badges]
verify_jwt = true

[functions.send-mfa-code]
verify_jwt = true

[functions.verify-mfa-code]
verify_jwt = false

[functions.validate-signup-location]
verify_jwt = false

[functions.send-event-reminders]
verify_jwt = false

[edge_runtime]
policy = "per_worker"

# Run event reminders every 10 minutes
[[edge_runtime.cron]]
name = "send-event-reminders"
schedule = "*/10 * * * *"
function_name = "send-event-reminders"
