[edge_runtime]
policy = "per_worker"

# Run event reminders every 10 minutes
[[edge_runtime.cron]]
name = "send-event-reminders"
schedule = "*/10 * * * *"
function_name = "send-event-reminders"

# Process waitlist promotions every 5 minutes
[[edge_runtime.cron]]
name = "process-waitlist"
schedule = "*/5 * * * *"
function_name = "process-waitlist"

# Clean up old channel messages every 6 hours
[[edge_runtime.cron]]
name = "cleanup-old-messages"
schedule = "0 */6 * * *"
function_name = "cleanup-old-messages"

# Delete old court posts daily at 3 AM
[[edge_runtime.cron]]
name = "delete-old-posts"
schedule = "0 3 * * *"
function_name = "delete-old-posts"

# Send tournament reminders every 5 minutes
[[edge_runtime.cron]]
name = "send-tournament-reminders"
schedule = "*/5 * * * *"
function_name = "send-tournament-reminders"
