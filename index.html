<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Modern SVG favicon — scales cleanly from browser-tab 16x16 up
         to PWA install icons. The focused mark (gold pulse beat on
         cream) stays readable at every size. -->
    <link rel="icon" href="/pulse-favicon.svg" type="image/svg+xml" />
    <!-- Legacy .ico fallback for browsers without SVG favicon support. -->
    <link rel="alternate icon" href="/favicon.ico" />
    <!-- Native-app feel: lock zoom (pinch + double-tap + iOS focus-zoom) and
         extend under the notch. maximum-scale/user-scalable are honored in
         installed PWA (standalone) mode across iOS + Android. viewport-fit=cover
         activates the env(safe-area-inset-*) padding the shell already uses. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <!-- Theme color matches the PlayerShell top chrome (ink) so the
         mobile browser address bar blends with the app header. -->
    <meta name="theme-color" content="#1B1D21" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="PULSE" />
    <!-- iOS 13+ supports SVG for apple-touch-icon. To support older iOS,
         export a 180x180 PNG from pulse-favicon.svg and replace this. -->
    <link rel="apple-touch-icon" href="/pulse-favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://ryxklkayezjnwwunuphn.supabase.co" crossorigin />
    <link rel="dns-prefetch" href="https://ryxklkayezjnwwunuphn.supabase.co" />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Sora:wght@600;700&display=swap" rel="stylesheet" />

    <title>PULSE — Play. Connect. Compete.</title>
    <meta name="description" content="PULSE is the home for pickleball players and venues. Find events, join round robins, run tournaments, and connect with your local community." />
    <meta name="author" content="PULSE" />

    <meta property="og:site_name" content="PULSE" />
    <meta property="og:title" content="PULSE — Play. Connect. Compete." />
    <meta property="og:description" content="The home for pickleball players and venues. Find events, join round robins, and connect with your local community." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://pulsepb.com/" />
    <!-- Branded PNG OG card — messaging apps (iMessage, WhatsApp, Slack)
         do not render SVG, so we ship a real PNG for reliable previews. -->
    <meta property="og:image" content="https://pulsepb.com/pulse-og.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="PULSE — Play. Connect. Compete." />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="PULSE — Play. Connect. Compete." />
    <meta name="twitter:description" content="The home for pickleball players and venues. Find events, join round robins, and connect with your local community." />
    <meta name="twitter:image" content="https://pulsepb.com/pulse-og.png" />

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "PULSE",
        "url": "https://pulsepb.com",
        "logo": "https://pulsepb.com/pulse-icon-512.png",
        "sameAs": []
      }
    </script>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "PULSE",
        "url": "https://pulsepb.com"
      }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
