<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Seamless gradient: black → gold → black across the full stroke.
         The transition zones sit where the flat line meets the pulse spike,
         so the color shift feels organic rather than like separate pieces. -->
    <linearGradient id="pulseStroke" x1="8" y1="50" x2="92" y2="50" gradientUnits="userSpaceOnUse">
      <stop offset="0"    stop-color="#1B1D21"/>
      <stop offset="0.30" stop-color="#1B1D21"/>
      <stop offset="0.40" stop-color="#CC9332"/>
      <stop offset="0.60" stop-color="#CC9332"/>
      <stop offset="0.70" stop-color="#1B1D21"/>
      <stop offset="1"    stop-color="#1B1D21"/>
    </linearGradient>

    <!-- Subtle unified shadow so the mark feels grounded, not floating. -->
    <filter id="pulseShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="2.5"
                    flood-color="#1B1D21" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Cream surface -->
  <rect width="100" height="100" rx="22" fill="#F4F1E9"/>

  <!-- Single continuous path with gradient stroke — one cohesive mark. -->
  <path d="M 12 50 H 36 l 8 -22 l 14 44 l 8 -22 H 88"
        fill="none"
        stroke="url(#pulseStroke)"
        stroke-width="7"
        stroke-linecap="round"
        stroke-linejoin="round"
        filter="url(#pulseShadow)"/>
</svg>