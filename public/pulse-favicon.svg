<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- PULSE app icon — focused brand mark. The full wordmark is unreadable
       at 16x16, so the favicon uses just the signature gold pulse beat
       (the ECG spike from the wordmark line) on the brand cream surface.
       Reads clearly from 16px up to a 512px PWA icon. -->
  <rect width="100" height="100" rx="22" fill="#F4F1E9"/>
  <!-- Ink flat-line entering from left -->
  <path d="M 12 50 H 36" fill="none" stroke="#1B1D21" stroke-width="7" stroke-linecap="round"/>
  <!-- Gold pulse beat — the brand-distinctive spike -->
  <path d="M 36 50 l 8 -22 l 14 44 l 8 -22" fill="none" stroke="#CC9332" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Ink flat-line exiting right -->
  <path d="M 64 50 H 88" fill="none" stroke="#1B1D21" stroke-width="7" stroke-linecap="round"/>
</svg>
